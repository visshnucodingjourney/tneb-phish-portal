<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    document.documentElement.setAttribute('data-theme',
      localStorage.getItem('phishguard-theme') ||
      (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
  </script>
  <title>Reset Password — TNEB Phish Awareness Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/phishguard.css') }}" rel="stylesheet">
</head>
<body>
<div class="login-wrap">

  <button class="theme-toggle" type="button" aria-label="Toggle theme" style="position:absolute;top:20px;right:24px;z-index:2;">
    <i class="bi bi-sun"></i>
  </button>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🛡️</div>
      <div class="login-title">TNEB</div>
      <div class="login-sub">Set a new password</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-3">
            <i class="bi bi-exclamation-circle-fill me-2"></i>{{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">New password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="new_password" id="new_pw" class="form-control"
                 placeholder="Min 8 characters" required minlength="8" autofocus>
          <button type="button" class="input-group-text" id="toggle-pw1">
            <i class="bi bi-eye-fill"></i>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Confirm new password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" id="conf_pw" class="form-control"
                 placeholder="Repeat new password" required minlength="8">
          <button type="button" class="input-group-text" id="toggle-pw2">
            <i class="bi bi-eye-fill"></i>
          </button>
        </div>
        <div id="pw-match-msg" style="font-size:11px;margin-top:6px;"></div>
      </div>

      <button type="submit" class="btn-pg btn-pg-primary w-100 justify-content-center" id="submitBtn"
              style="padding:10px;font-size:14px;">
        <i class="bi bi-check-circle-fill"></i> Reset Password
      </button>
    </form>

    <div class="text-center mt-4" style="font-size:12.5px;">
      <a href="{{ url_for('auth.login') }}" style="color:var(--accent);text-decoration:none;">
        <i class="bi bi-arrow-left"></i> Back to login
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/phishguard.js') }}"></script>
<script>
  function wireToggle(btnId, inputId) {
    const btn = document.getElementById(btnId);
    const input = document.getElementById(inputId);
    btn.addEventListener('click', () => {
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash-fill';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye-fill';
      }
    });
  }
  wireToggle('toggle-pw1', 'new_pw');
  wireToggle('toggle-pw2', 'conf_pw');

  const newPw = document.getElementById('new_pw');
  const confPw = document.getElementById('conf_pw');
  const msg = document.getElementById('pw-match-msg');
  const btn = document.getElementById('submitBtn');

  function checkMatch() {
    if (!confPw.value) { msg.textContent = ''; return; }
    if (newPw.value === confPw.value) {
      msg.textContent = '✓ Passwords match';
      msg.style.color = '#1D9E75';
      btn.disabled = false;
    } else {
      msg.textContent = '✗ Passwords do not match';
      msg.style.color = '#E24B4A';
      btn.disabled = true;
    }
  }
  newPw.addEventListener('input', checkMatch);
  confPw.addEventListener('input', checkMatch);
</script>
</body>
</html>
