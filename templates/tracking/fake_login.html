
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zimbra Web Client Sign In</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;

    background: linear-gradient(
        to bottom,
        #1d9bd1 0%,
        #188fc5 60%,
        #0f6f99 100%
    );
}

.login-box{
    width:475px;
    background:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.login-content{
    padding:40px 50px;
}

.logo{
    font-size:72px;
    color:#1d9bd1;
    font-weight:300;
    line-height:1;
    margin-bottom:10px;
}

.heading{
    font-size:24px;
    font-weight:600;
    margin-bottom:30px;
    color:#444;
}

.form-label{
    font-size:14px;
    color:#444;
}

.form-control{
    border-radius:0;
    height:44px;
}

.password-row{
    position:relative;
}

.show-btn{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:none;
    color:#555;
}

.login-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.login-btn{
    background:#178fca;
    border:none;
    color:#fff;
    padding:10px 35px;
    font-size:22px;
}

.bottom{
    background:#f2f2f2;
    padding:25px 50px;
    border-top:1px solid #ddd;
}

select{
    width:100%;
    height:40px;
}
</style>
</head>

<body>

<div class="login-box">

    <div class="login-content">

        <div class="logo">zimbra</div>

        <div class="heading">Log In</div>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       class="form-control"
                       name="username"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>

                <div class="password-row">
                    <input type="password"
                           id="password"
                           class="form-control"
                           name="password"
                           required>

                    <button type="button"
                            class="show-btn"
                            onclick="togglePassword()">
                        Show
                    </button>
                </div>
            </div>

            <div class="login-row">

                <button class="login-btn"
                        type="submit">
                    Log In
                </button>

                <label>
                    <input type="checkbox">
                    Remember me
                </label>

            </div>

        </form>

    </div>

    <div class="bottom">

        <label class="form-label">Version</label>

        <select>
            <option>Default</option>
        </select>

    </div>

</div>

<script>
function togglePassword(){
    let pw = document.getElementById('password');
    pw.type = pw.type === 'password'
        ? 'text'
        : 'password';
}
</script>

</body>
</html>
